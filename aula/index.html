<div style="position:fixed;bottom:14px;width:100%;text-align:center">
  <a href="../index.html" style="color:var(--soft);font-size:12px">← Volver a catto.ar</a>
</div>

<!-- Supabase (copia local, sin depender de CDN externo) -->
<script src="assets/vendor/supabase.js"></script>
<script src="assets/config.js"></script>
<script>
(function(){
  const msg  = document.getElementById('msg');
  const form = document.getElementById('loginForm');
  const show = (t,c)=>{ msg.style.color='var('+(c||'--muted')+')'; msg.textContent=t; };

  // Atamos el submit PRIMERO, así nunca recarga la página aunque algo falle
  form.addEventListener('submit', onSubmit);

  let sb = null;
  try{
    if(typeof supabase === 'undefined') throw new Error('no cargó la librería de Supabase');
    if(!window.AULA_CONFIG) throw new Error('no cargó la configuración');
    sb = supabase.createClient(window.AULA_CONFIG.SUPABASE_URL, window.AULA_CONFIG.SUPABASE_KEY);
  }catch(err){
    show('No se pudo iniciar la app ('+err.message+'). Recargá con Ctrl+F5; si sigue, desactivá bloqueadores/escudos del navegador.', '--hot');
  }

  if(sb){
    sb.auth.getSession().then(async ({ data:{ session } })=>{
      if(!session) return;
      const { data:p } = await sb.from('perfil').select('rol').eq('id', session.user.id).single();
      if(p){ msg.style.color='var(--muted)';
        msg.innerHTML = `Ya tenés sesión iniciada. <a href="${p.rol==='profesor'?'profesor.html':'estudiante.html'}">Continuar →</a>`; }
    }).catch(()=>{});
  }

  async function onSubmit(e){
    e.preventDefault();
    if(!sb){ show('La app no inició bien. Recargá la página (Ctrl+F5).', '--hot'); return; }
    const id = document.getElementById('usuario').value.trim();
    const pass = document.getElementById('pass').value;
    if(!id || !pass){ show('Completá usuario y contraseña.', '--warn'); return; }
    show('Verificando…');
    try{
      const email = id.includes('@') ? id : `${id}@${window.AULA_CONFIG.EMAIL_DOMAIN}`;
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
      if(error){ show('No pudimos ingresar: '+error.message, '--hot'); return; }
      const { data:perfil, error:pe } = await sb.from('perfil').select('rol,nombre,activo').eq('id', data.user.id).single();
      if(pe || !perfil){ show('Ingresaste, pero no encontré tu perfil en la base.', '--warn'); return; }
      if(perfil.rol==='estudiante' && perfil.activo===false){ await sb.auth.signOut(); show('Tu cuenta está desactivada. Consultá con el profesor.', '--warn'); return; }
      show(`✅ Hola ${perfil.nombre||''} (rol: ${perfil.rol}). Entrando…`, '--ok');
      setTimeout(()=>{ location.href = perfil.rol==='profesor' ? 'profesor.html' : 'estudiante.html'; }, 1000);
    }catch(err){ show('Error de conexión: '+err.message, '--hot'); }
  }
})();
</script>
</body>
</html>
