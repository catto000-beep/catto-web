    <div class="mw"></div>

<!-- Campo de estrellas generado (Vía Láctea) -->
<script>
(function(){
  const sf = document.querySelector('.gate .starfield');
  if(!sf) return;
  // Línea central de la banda (en %), de arriba-izq a abajo-centro
  const A = {x:42, y:2}, B = {x:60, y:100};
  const dx = B.x-A.x, dy = B.y-A.y, len2 = dx*dx+dy*dy;
  const distBand = (x,y)=>{
    let t = ((x-A.x)*dx + (y-A.y)*dy)/len2; t = Math.max(0, Math.min(1, t));
    return Math.hypot(x-(A.x+t*dx), y-(A.y+t*dy));
  };
  const gauss = ()=> (Math.random()+Math.random()+Math.random()-1.5)/1.5; // ~[-1,1]
  const pick  = a => a[(Math.random()*a.length)|0];
  const whites = ['#ffffff','#f2f6ff','#e6eeff'];
  const blues  = ['#cdd9ff','#bcccff','#a9c2ff'];
  const warms  = ['#fff0dc','#ffe3c2'];
  const pinks  = ['#ffd2de','#ffc2d8'];
  let html = '';
  const star = (x,y,size,op,color,glow)=>{
    if(x<-2||x>102||y<-2||y>102) return;
    const sh = glow ? `;box-shadow:0 0 ${(size*1.8).toFixed(1)}px ${color}` : '';
    html += `<i style="left:${x.toFixed(2)}%;top:${y.toFixed(2)}%;width:${size.toFixed(2)}px;height:${size.toFixed(2)}px;opacity:${op.toFixed(2)};background:${color}${sh}"></i>`;
  };
  // 1) Campo general disperso por todo el cielo
  for(let i=0;i<300;i++){
    const x=Math.random()*100, y=Math.random()*100;
    const near = distBand(x,y);
    const boost = Math.max(0, 1-near/34);
    const size = 0.6 + Math.random()*1.3 + boost*Math.random()*0.9;
    const op   = Math.min(1, 0.22 + Math.random()*0.45 + boost*0.2);
    const r = Math.random();
    const color = r<0.6 ? pick(whites) : r<0.85 ? pick(blues) : r<0.95 ? pick(warms) : pick(pinks);
    star(x, y, size, op, color, size>2.3);
  }
  // 2) Estrellas concentradas en la banda (más densas y brillantes hacia el núcleo, abajo)
  for(let i=0;i<340;i++){
    let t = Math.random();
    if(Math.random()<0.5) t = 0.55 + Math.random()*0.45; // sesgo hacia el núcleo
    const cx = A.x + t*dx, cy = A.y + t*dy;
    const spread = 5 + t*11;                     // la banda se ensancha hacia abajo
    const x = cx + gauss()*spread;
    const y = cy + gauss()*spread*0.7;
    const core = t>0.6;
    const size = 0.6 + Math.random()*1.4 + (core?Math.random()*1.3:0.4);
    const op   = Math.min(1, 0.3 + Math.random()*0.5 + (core?0.2:0));
    const r = Math.random();
    let color;
    if(core) color = r<0.4?pick(whites):r<0.65?pick(warms):r<0.85?pick(blues):pick(pinks);
    else     color = r<0.55?pick(whites):r<0.85?pick(blues):r<0.95?pick(warms):pick(pinks);
    star(x, y, size, op, color, size>2.2);
  }
  sf.insertAdjacentHTML('beforeend', html);
})();
</script>

<!-- Supabase (copia local, sin depender de CDN externo) -->
<script src="assets/vendor/supabase.js"></script>
<script src="assets/config.js"></script>
<script>
(function(){
  const msg  = document.getElementById('msg');
  const form = document.getElementById('loginForm');
  const show = (t,c)=>{ msg.style.color='var('+(c||'--muted')+')'; msg.textContent=t; };

  // Atamos el submit PRIMERO, así nunca recarga la página aunque algo falle
  form.addEventListener('submit', onSubmit);

  let sb = null;
  try{
    if(typeof supabase === 'undefined') throw new Error('no cargó la librería de Supabase');
    if(!window.AULA_CONFIG) throw new Error('no cargó la configuración');
    sb = supabase.createClient(window.AULA_CONFIG.SUPABASE_URL, window.AULA_CONFIG.SUPABASE_KEY);
  }catch(err){
    show('No se pudo iniciar la app ('+err.message+'). Recargá con Ctrl+F5; si sigue, desactivá bloqueadores/escudos del navegador.', '--hot');
  }

  if(sb){
    sb.auth.getSession().then(async ({ data:{ session } })=>{
      if(!session) return;
      const { data:p } = await sb.from('perfil').select('rol').eq('id', session.user.id).single();
      if(p){ msg.style.color='var(--muted)';
        msg.innerHTML = `Ya tenés sesión iniciada. <a href="${p.rol==='profesor'?'profesor.html':'estudiante.html'}">Continuar →</a>`; }
    }).catch(()=>{});
  }

  async function onSubmit(e){
    e.preventDefault();
    if(!sb){ show('La app no inició bien. Recargá la página (Ctrl+F5).', '--hot'); return; }
    const id = document.getElementById('usuario').value.trim();
    const pass = document.getElementById('pass').value;
    if(!id || !pass){ show('Completá usuario y contraseña.', '--warn'); return; }
    show('Verificando…');
    try{
      const email = id.includes('@') ? id : `${id}@${window.AULA_CONFIG.EMAIL_DOMAIN}`;
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
      if(error){ show('No pudimos ingresar: '+error.message, '--hot'); return; }
      const { data:perfil, error:pe } = await sb.from('perfil').select('rol,nombre,activo').eq('id', data.user.id).single();
      if(pe || !perfil){ show('Ingresaste, pero no encontré tu perfil en la base.', '--warn'); return; }
      if(perfil.rol==='estudiante' && perfil.activo===false){ await sb.auth.signOut(); show('Tu cuenta está desactivada. Consultá con el profesor.', '--warn'); return; }
      show(`✅ Hola ${perfil.nombre||''} (rol: ${perfil.rol}). Entrando…`, '--ok');
      setTimeout(()=>{ location.href = perfil.rol==='profesor' ? 'profesor.html' : 'estudiante.html'; }, 1000);
    }catch(err){ show('Error de conexión: '+err.message, '--hot'); }
  }
})();
</script>
